{% extends "base.html" %}
{% block title %}Page Not Found · WIOM{% endblock %}
{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:18px;">
    <div style="font-size:72px;line-height:1;">🔍</div>
    <h2 style="font-size:32px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">404 — Page Not Found</h2>
    <p style="color:var(--gray-light);font-size:15px;max-width:400px;">The page you're looking for doesn't exist or has been moved.</p>
    <div style="display:flex;gap:12px;margin-top:8px;">
        <a href="{{ url_for('dashboard') }}" class="btn">Go to Dashboard</a>
        <a href="javascript:history.back()" class="btn ghost">← Go Back</a>
    </div>
</div>
{% endblock %}
