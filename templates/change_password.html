{% extends "base.html" %}
{% block title %}Change Password · WIOM{% endblock %}
{% block content %}
<div class="page-head"><div><h2>Change Password</h2>
<div class="sub">Update your own password — you'll need your current one</div></div></div>

<div class="card" style="max-width:460px;">
    <form method="POST">
        <div style="margin-bottom:14px;"><label>Current password</label>
            <input type="password" name="old" required autofocus></div>
        <div style="margin-bottom:14px;"><label>New password (min 6 chars)</label>
            <input type="password" name="new" required minlength="6"></div>
        <div style="margin-bottom:18px;"><label>Confirm new password</label>
            <input type="password" name="confirm" required minlength="6"></div>
        <button class="btn" type="submit">🔒 Update password</button>
    </form>
    <p class="muted" style="margin-top:14px;">Forgot your current password? Ask the Tax Team (admin) — they can reset it for you without the old password.</p>
</div>
{% endblock %}
